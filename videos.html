<style>
/* ===================================================================
   三木義一 研究と実務の記録
   Academic Institution Style — 学術機関風
   =================================================================== */

:root {
  --ink: #1a1a1a;
  --ink-soft: #2d3142;
  --ink-light: #4a4f5e;
  --ink-lighter: #6c7085;
  --ink-lightest: #a0a5b5;
  --paper: #fafaf7;
  --paper-warm: #f4f3ee;
  --paper-cool: #f0f2f5;
  --navy: #1e3a5f;
  --navy-deep: #152947;
  --navy-light: #2a4a7c;
  --accent: #8b2332;
  --accent-light: #a63e4e;
  --gold: #a07c2c;
  --gold-soft: #c4a457;
  --rule: #d8d5ce;
  --rule-soft: #e8e6e0;
  --highlight: #fbf7e8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: "Zen Kaku Gothic New", "游ゴシック", "Yu Gothic", "Noto Sans JP", sans-serif;
  background: var(--paper);
  color: var(--ink);
  line-height: 1.8;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
}

/* ヘッダー */
.site-header {
  background: var(--navy-deep);
  color: var(--paper);
  padding: 0;
}
.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 28px 40px 24px;
  display: flex;
  align-items: baseline;
  gap: 20px;
}
.site-title {
  font-family: "Shippori Mincho", serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--paper);
  text-decoration: none;
}
.site-subtitle {
  font-size: 12px;
  color: var(--ink-lightest);
  letter-spacing: 0.1em;
}

/* ナビ */
.main-nav {
  background: var(--navy);
  border-bottom: 2px solid var(--navy-light);
}
.nav-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 40px;
  display: flex;
  gap: 4px;
  overflow-x: auto;
}
.nav-inner a {
  color: rgba(255,255,255,0.8);
  text-decoration: none;
  font-size: 13px;
  letter-spacing: 0.06em;
  padding: 14px 16px;
  display: block;
  white-space: nowrap;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
}
.nav-inner a:hover {
  color: #fff;
  background: rgba(255,255,255,0.06);
}
.nav-inner a.current {
  color: #fff;
  border-bottom-color: var(--gold-soft);
  font-weight: 600;
}

/* ページヘッダー */
.page-header {
  background: var(--navy-deep);
  color: var(--paper);
  padding: 52px 40px 44px;
  text-align: center;
}
.page-title {
  font-family: "Shippori Mincho", serif;
  font-size: 32px;
  font-weight: 700;
  letter-spacing: 0.12em;
  margin-bottom: 10px;
}
.page-subtitle {
  font-size: 14px;
  color: var(--ink-lightest);
  letter-spacing: 0.08em;
}

/* メイン */
main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 60px 40px 80px;
}

/* セクション */
.video-section {
  margin-bottom: 60px;
}
.video-section-title {
  font-family: "Shippori Mincho", serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--navy);
  border-left: 4px solid var(--accent);
  padding-left: 16px;
  margin-bottom: 8px;
}
.video-section-desc {
  font-size: 14px;
  color: var(--ink-lighter);
  margin-bottom: 28px;
  padding-left: 20px;
}

/* 動画グリッド */
.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 24px;
}

/* ローディング */
.loading-msg {
  color: var(--ink-lighter);
  font-size: 14px;
  padding: 40px 0;
}

/* 動画カード */
.video-card {
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: 4px;
  overflow: hidden;
  transition: box-shadow 0.2s, transform 0.2s;
  display: block;
}
.video-card:hover {
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  transform: translateY(-2px);
}
.video-thumb {
  width: 100%;
  aspect-ratio: 16/9;
  overflow: hidden;
  background: #000;
}
.video-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.video-info {
  padding: 12px 14px;
}
.video-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-soft);
  line-height: 1.5;
  margin-bottom: 4px;
}
.video-tag {
  font-size: 11px;
  color: var(--ink-lightest);
}

/* チャンネルリンク */
.channel-link-bar {
  margin-top: 48px;
  text-align: center;
  padding: 28px;
  background: var(--paper-warm);
  border: 1px solid var(--rule);
  border-radius: 4px;
}
.channel-link-bar p {
  font-size: 14px;
  color: var(--ink-light);
  margin-bottom: 14px;
}
.channel-btn {
  display: inline-block;
  background: var(--navy);
  color: #fff;
  text-decoration: none;
  padding: 10px 28px;
  font-size: 14px;
  letter-spacing: 0.06em;
  border-radius: 3px;
  transition: background 0.2s;
}
.channel-btn:hover {
  background: var(--navy-light);
}

/* フッター */
footer {
  background: var(--navy-deep);
  color: rgba(255,255,255,0.5);
  text-align: center;
  padding: 32px 20px;
  font-size: 12px;
  letter-spacing: 0.08em;
}

@media (max-width: 700px) {
  .header-inner { padding: 20px; }
  .nav-inner { padding: 0 12px; }
  main { padding: 40px 20px 60px; }
  .page-header { padding: 36px 20px 32px; }
  .video-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
}

.site-title-sub { font-size: 0.52em; font-weight: 400; opacity: 0.85; letter-spacing: 0.06em; }
</style>
</head>
<body>

  </div>
</header>

<nav class="main-nav">

<div class="page-header">
  <h1 class="page-title">動画</h1>
  <p class="page-subtitle">新まさかの税金 — 日本編・世界編</p>
</div>

<main>

  <!-- 動画一覧（RSS自動取得） -->
  <div id="video-grid" class="video-grid">
    <div class="loading-msg">動画を読み込んでいます…</div>
  </div>

  <!-- チャンネルリンク -->
  <div class="channel-link-bar">
    <p>その他の動画はYouTubeチャンネル「MIKI 庶民大学」でご覧いただけます。</p>
    <a href="https://www.youtube.com/@miki68" class="channel-btn" target="_blank" rel="noopener noreferrer">YouTubeチャンネルへ →</a>
  </div>

</main>

<script>
(function() {
  var CHANNEL_ID = 'UCqjfIEklXguTVxLFTzsKbzA';
  var RSS_URL = 'https://www.youtube.com/feeds/videos.xml?channel_id=' + CHANNEL_ID;
  var API_URL = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(RSS_URL) + '&count=50';
  var grid = document.getElementById('video-grid');

  fetch(API_URL)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.items || data.items.length === 0) {
        grid.innerHTML = '<p class="loading-msg">動画が見つかりませんでした。</p>';
        return;
      }
      grid.innerHTML = '';
      data.items.forEach(function(item) {
        // videoIDを抽出
        var match = item.link.match(/[?&]v=([^&]+)/) || item.link.match(/shorts\/([^?]+)/);
        if (!match) return;
        var vid = match[1];
        var thumb = 'https://img.youtube.com/vi/' + vid + '/mqdefault.jpg';
        var date = item.pubDate ? item.pubDate.slice(0, 10) : '';
        var card = document.createElement('a');
        card.href = item.link;
        card.target = '_blank';
        card.rel = 'noopener noreferrer';
        card.className = 'video-card';
        card.style.textDecoration = 'none';
        card.innerHTML =
          '<div class="video-thumb"><img src="' + thumb + '" alt="' + item.title + '" loading="lazy"></div>' +
          '<div class="video-info">' +
            '<div class="video-title">' + item.title + '</div>' +
            '<div class="video-tag">' + date + '</div>' +
          '</div>';
        grid.appendChild(card);
      });
    })
    .catch(function() {
      grid.innerHTML = '<p class="loading-msg">読み込みに失敗しました。<a href="https://www.youtube.com/@miki68" target="_blank">YouTubeで見る</a></p>';
    });
})();
</script>

<footer>

</style>
