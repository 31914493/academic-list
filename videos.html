<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
/* ===================================================================
   三木義一 全業績アーカイブ
   Academic Institution Style — 学術機関風
   =================================================================== */

:root {
  --ink: #1a1a1a;
  --ink-soft: #2d3142;
  --ink-light: #4a4f5e;
  --ink-lighter: #6c7085;
  --ink-lightest: #a0a5b5;
  --paper: #fafaf7;
  --paper-warm: #f4f3ee;
  --paper-cool: #f0f2f5;
  --navy: #1e3a5f;
  --navy-deep: #152947;
  --navy-light: #2a4a7c;
  --accent: #8b2332;
  --accent-light: #a63e4e;
  --gold: #a07c2c;
  --gold-soft: #c4a457;
  --rule: #d8d5ce;
  --rule-soft: #e8e6e0;
  --highlight: #fbf7e8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: "Zen Kaku Gothic New", "游ゴシック", "Yu Gothic", "Noto Sans JP", sans-serif;
  background: var(--paper);
  color: var(--ink);
  line-height: 1.8;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
}

/* ヘッダー */
.site-header {
  background: var(--navy-deep);
  color: var(--paper);
  padding: 0;
}
.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 28px 40px 24px;
  display: flex;
  align-items: baseline;
  gap: 20px;
}
.site-title {
  font-family: "Shippori Mincho", serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--paper);
  text-decoration: none;
}
.site-subtitle {
  font-size: 12px;
  color: var(--ink-lightest);
  letter-spacing: 0.1em;
}

/* ナビ */
.main-nav {
  background: var(--navy);
  border-bottom: 2px solid var(--navy-light);
}
.nav-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 40px;
  display: flex;
  gap: 4px;
  overflow-x: auto;
}
.nav-inner a {
  color: rgba(255,255,255,0.8);
  text-decoration: none;
  font-size: 13px;
  letter-spacing: 0.06em;
  padding: 14px 16px;
  display: block;
  white-space: nowrap;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
}
.nav-inner a:hover {
  color: #fff;
  background: rgba(255,255,255,0.06);
}
.nav-inner a.current {
  color: #fff;
  border-bottom-color: var(--gold-soft);
  font-weight: 600;
}

/* ページヘッダー */
.page-header {
  background: var(--navy-deep);
  color: var(--paper);
  padding: 52px 40px 44px;
  text-align: center;
}
.page-title {
  font-family: "Shippori Mincho", serif;
  font-size: 32px;
  font-weight: 700;
  letter-spacing: 0.12em;
  margin-bottom: 10px;
}
.page-subtitle {
  font-size: 14px;
  color: var(--ink-lightest);
  letter-spacing: 0.08em;
}

/* メイン */
main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 60px 40px 80px;
}

/* セクション */
.video-section {
  margin-bottom: 60px;
}
.video-section-title {
  font-family: "Shippori Mincho", serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--navy);
  border-left: 4px solid var(--accent);
  padding-left: 16px;
  margin-bottom: 8px;
}
.video-section-desc {
  font-size: 14px;
  color: var(--ink-lighter);
  margin-bottom: 28px;
  padding-left: 20px;
}

/* 動画グリッド */
.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 28px;
}

/* 動画カード */
.video-card {
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: 4px;
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.video-card:hover {
  box-shadow: 0 4px 16px rgba(0,0,0,0.10);
}
.video-embed {
  position: relative;
  width: 100%;
  padding-top: 177.78%; /* 9:16 縦長 */
  background: #000;
}
.video-embed iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  border: none;
}
.video-info {
  padding: 14px 16px;
}
.video-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink-soft);
  line-height: 1.5;
  margin-bottom: 6px;
}
.video-tag {
  font-size: 12px;
  color: var(--ink-lightest);
}

/* チャンネルリンク */
.channel-link-bar {
  margin-top: 48px;
  text-align: center;
  padding: 28px;
  background: var(--paper-warm);
  border: 1px solid var(--rule);
  border-radius: 4px;
}
.channel-link-bar p {
  font-size: 14px;
  color: var(--ink-light);
  margin-bottom: 14px;
}
.channel-btn {
  display: inline-block;
  background: var(--navy);
  color: #fff;
  text-decoration: none;
  padding: 10px 28px;
  font-size: 14px;
  letter-spacing: 0.06em;
  border-radius: 3px;
  transition: background 0.2s;
}
.channel-btn:hover {
  background: var(--navy-light);
}

/* フッター */
footer {
  background: var(--navy-deep);
  color: rgba(255,255,255,0.5);
  text-align: center;
  padding: 32px 20px;
  font-size: 12px;
  letter-spacing: 0.08em;
}

@media (max-width: 700px) {
  .header-inner { padding: 20px; }
  .nav-inner { padding: 0 12px; }
  main { padding: 40px 20px 60px; }
  .page-header { padding: 36px 20px 32px; }
  .video-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="site-title">三木義一 全業績</a>
    <span class="site-subtitle">Yoshikazu Miki — Academic Archive</span>
  </div>
</header>

<nav class="main-nav">
  <div class="nav-inner">
    <a href="index.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-2px;margin-right:4px"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </a>
    <a href="profile.html">プロフィール</a>
    <a href="books.html">著書</a>
    <a href="articles.html">学術論文</a>
    <a href="opinions.html">意見書</a>
    <a href="columns.html">新聞連載</a>
    <a href="misc.html">その他</a>

    <a href="videos.html" class="current">動画</a>
    <a href="guestbook.html">足跡・ご要望</a>
  </div>
</nav>

<div class="page-header">
  <h1 class="page-title">動画</h1>
  <p class="page-subtitle">新まさかの税金 — 日本編・世界編</p>
</div>

<main>

  <!-- 日本編 -->
  <section class="video-section">
    <h2 class="video-section-title">日本編</h2>
    <p class="video-section-desc">日本の税金にまつわる「まさか」を、身近な事例からわかりやすく解説。</p>
    <div class="video-grid">

      <div class="video-card">
        <div class="video-embed">
          <iframe src="https://www.youtube.com/embed/MoVqb9wnHo8"
            title="交通費と社会保険"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen></iframe>
        </div>
        <div class="video-info">
          <div class="video-title">交通費と社会保険</div>
          <div class="video-tag">日本編</div>
        </div>
      </div>

    </div>
  </section>

  <!-- 世界編 -->
  <section class="video-section">
    <h2 class="video-section-title">世界編</h2>
    <p class="video-section-desc">世界各国の税制・税務裁判の「まさか」を紹介。</p>
    <div class="video-grid">

      <div class="video-card">
        <div class="video-embed">
          <iframe src="https://www.youtube.com/embed/EnoPPxd8DqM"
            title="イギリス・税金裁判の数"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen></iframe>
        </div>
        <div class="video-info">
          <div class="video-title">イギリス・税金裁判の数</div>
          <div class="video-tag">世界編 — イギリス</div>
        </div>
      </div>

    </div>
  </section>

  <!-- チャンネルリンク -->
  <div class="channel-link-bar">
    <p>その他の動画はYouTubeチャンネル「MIKI 庶民大学」でご覧いただけます。</p>
    <a href="https://www.youtube.com/@miki68" class="channel-btn" target="_blank" rel="noopener noreferrer">YouTubeチャンネルへ →</a>
  </div>

</main>

<footer>
  <p>© 三木義一 全業績アーカイブ</p>
</footer>

<!-- トップへ戻るボタン -->
<button id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="ページトップへ戻る">▲</button>
<style>
#back-to-top {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  width: 44px;
  height: 44px;
  background: var(--navy, #1e3a5f);
  color: #fff;
  border: none;
  border-radius: 4px;
  font-size: 0.85rem;
  cursor: pointer;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.3s, visibility 0.3s;
  z-index: 999;
}
#back-to-top.visible { opacity: 0.85; visibility: visible; }
#back-to-top:hover { opacity: 1; }
</style>
<script>
(function(){
  var btn = document.getElementById('back-to-top');
  window.addEventListener('scroll', function(){
    btn.classList.toggle('visible', window.scrollY > 300);
  });
})();
</script>
